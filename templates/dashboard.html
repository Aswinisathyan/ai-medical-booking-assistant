<!DOCTYPE html>
<html>
<head>
    <title>Medical Lab Dashboard</title>

    <style>
        :root {
            --bg: #f5f6f2;
            --card: #ffffff;
            --table-dark: #eef1ea;
            --table-light: #f9faf7;
            --olive: #a3b18a;
            --bronze: #b08968;
            --text: #2f3e2f;
            --border: #dde2d4;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        /* HEADER */
        .header {
            background: linear-gradient(90deg, var(--olive), var(--bronze));
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            animation: fadeIn 0.8s ease;
        }

        .container {
            width: 92%;
            margin: 30px auto;
        }

        /* CARD */
        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 22px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.06);
            animation: slideUp 0.7s ease;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-4px);
        }

        h3 {
            margin-top: 0;
            color: var(--olive);
        }

        /* TABLE */
        table {
            width: 100%;
            border-collapse: collapse;
            border-radius: 10px;
            overflow: hidden;
        }

        th {
            background: var(--olive);
            color: white;
            padding: 12px;
            text-align: left;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        /* STRIPED ROWS */
        tbody tr:nth-child(odd) {
            background: var(--table-light);
        }

        tbody tr:nth-child(even) {
            background: var(--table-dark);
        }

        /* HOVER EFFECT */
        tr {
            position: relative;
            overflow: hidden;
        }

        tr:hover {
            transform: scale(1.01);
            background: linear-gradient(90deg, #f0f3ea, #f7f9f4);
        }

        /* SHIMMER EFFECT */
        tr::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
        }

        tr:hover::before {
            left: 100%;
        }

        /* RIPPLE CLICK */
        tr::after {
            content: "";
            position: absolute;
            background: rgba(0,0,0,0.05);
            width: 0;
            height: 0;
            border-radius: 50%;
            opacity: 0;
        }

        tr:active::after {
            width: 200%;
            height: 200%;
            opacity: 1;
            transition: 0.4s;
        }

        /* BADGES */
        .badge {
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            animation: pulse 2s infinite;
        }

        .today {
            background: #e9eddc;
            color: #5a7d5a;
        }

        .tomorrow {
            background: #f2e6dc;
            color: #9a6c4c;
        }

        .none {
            background: #e5e7e2;
            color: #777;
        }

        /* ROW ENTRY ANIMATION */
        tbody tr {
            opacity: 0;
            transform: translateY(20px);
            animation: rowFade 0.6s ease forwards;
        }

        tbody tr:nth-child(1) { animation-delay: 0.1s; }
        tbody tr:nth-child(2) { animation-delay: 0.2s; }
        tbody tr:nth-child(3) { animation-delay: 0.3s; }
        tbody tr:nth-child(4) { animation-delay: 0.4s; }
        tbody tr:nth-child(5) { animation-delay: 0.5s; }

        /* ANIMATIONS */
        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes rowFade {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.04); }
            100% { transform: scale(1); }
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            th, td {
                font-size: 12px;
                padding: 8px;
            }
        }

    </style>
</head>

<body>

<div class="header">
    🌿 Medical Lab Dashboard
</div>

<div class="container">
    <div class="card">

        <h3>📋 Bookings</h3>
        <p>Total Bookings: {{ bookings|length }}</p>

        <table>
            <thead>
                <tr>
                    <th>📞 Phone</th>
                    <th>💬 Message</th>
                    <th>📅 Date</th>
                    <th>⏰ Time</th>
                </tr>
            </thead>

            <tbody>
            {% for b in bookings %}
            <tr>
                <td>{{ b[0] }}</td>
                <td>{{ b[1] }}</td>

                <td>
                    {% if b[2] == "today" %}
                        <span class="badge today">Today</span>
                    {% elif b[2] == "tomorrow" %}
                        <span class="badge tomorrow">Tomorrow</span>
                    {% else %}
                        <span class="badge none">{{ b[2] }}</span>
                    {% endif %}
                </td>

                <td>{{ b[3] }}</td>
            </tr>
            {% endfor %}
            </tbody>
        </table>

    </div>
</div>

</body>
</html>
